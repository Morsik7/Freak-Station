# Parasite Evolution Stages

# Stage 1: Larva (base form)
- type: entity
  id: ParasiteLarva
  parent: BaseMob
  name: parasite larva
  description: A grotesque parasitic organism. It seeks a host to infect.
  components:
  - type: ParasiteLarva
  - type: ParasiteStage
    stage: Larva
  - type: Sprite
    sprite: Mobs/Aliens/Xenos/larva.rsi
    state: larva
  - type: MobThresholds
    thresholds:
      0: Alive
      50: Dead
  - type: Damageable
    damageContainer: Biological
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3

# Stage 2: Infected Mouse
- type: entity
  id: ParasiteMouse
  parent: MobMouse
  name: infected mouse
  description: A mouse possessed by a parasitic organism. Its eyes glow with an unnatural light.
  components:
  - type: ParasiteLarva
  - type: ParasiteStage
    stage: Mouse
  - type: ParasiteInfectious
    infectionChance: 1.0
  - type: Sprite
    sprite: Mobs/Animals/mouse.rsi
    layers:
    - state: mouse
      color: "#8B4789"
  - type: MobThresholds
    thresholds:
      0: Alive
      80: Dead

# Stage 3: Infected Monkey
- type: entity
  id: ParasiteMonkey
  parent: MobMonkey
  name: infected monkey
  description: A monkey possessed by a parasitic organism. Its movements are unnaturally fluid.
  components:
  - type: ParasiteLarva
  - type: ParasiteStage
    stage: Monkey
  - type: ParasiteInfectious
    infectionChance: 1.0
  - type: Sprite
    sprite: Mobs/Animals/monkey.rsi
    layers:
    - state: monkey
      color: "#7B3F7A"
  - type: MobThresholds
    thresholds:
      0: Alive
      150: Dead

# Stage 4: Chimera (fully infected human)
# This is applied as a component to the infected human, not a separate entity
