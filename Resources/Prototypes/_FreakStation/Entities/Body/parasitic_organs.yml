# Parasitic Organs

# Parasitic Heart - grants pressure immunity
- type: entity
  id: OrganParasiticHeart
  parent: BaseHumanOrgan
  name: parasitic heart
  description: A grotesque organic heart grown by the parasite. It pumps with unnatural vigor.
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    state: heart-on
    color: "#8B4789"
  - type: Organ
  - type: Metabolizer
    maxReagents: 2
    metabolizerTypes: [ Animal ]
    groups:
    - id: Medicine
    - id: Poison
    - id: Narcotic
  - type: PressureImmunity
  - type: Tag
    tags:
    - ParasiticOrgan

# Parasitic Lungs - no oxygen requirement
- type: entity
  id: OrganParasiticLungs
  parent: BaseHumanOrgan
  name: parasitic lungs
  description: Alien respiratory organs that don't require oxygen.
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi
    layers:
    - state: lung-l
      color: "#8B4789"
    - state: lung-r
      color: "#8B4789"
  - type: Organ
  - type: Lung
  - type: Metabolizer
    maxReagents: 100
    metabolizerTypes: [ Animal ]
    groups:
    - id: Gas
      metabolismRate: 0.0  # No oxygen consumption
  - type: Tag
    tags:
    - ParasiticOrgan
