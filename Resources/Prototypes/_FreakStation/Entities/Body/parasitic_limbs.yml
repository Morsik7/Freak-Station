# Parasitic Limbs
# Arms are whole (arm + claw in one), legs are single fused mass

- type: entity
  id: ParasiticLeftArm
  parent: LeftArmHuman
  name: parasitic left arm
  description: A grotesque organic limb with sharp claws. Grown by the parasite as one horrifying piece.
  components:
  - type: ParasiticLimb
    limbType: Arm
    damageMultiplier: 1.5
  - type: Sprite
    sprite: _FreakStation/Mobs/Species/Human/ParasiticParts/parts.rsi
    state: l_arm

- type: entity
  id: ParasiticRightArm
  parent: RightArmHuman
  name: parasitic right arm
  description: A grotesque organic limb with sharp claws. Grown by the parasite as one horrifying piece.
  components:
  - type: ParasiticLimb
    limbType: Arm
    damageMultiplier: 1.5
  - type: Sprite
    sprite: _FreakStation/Mobs/Species/Human/ParasiticParts/parts.rsi
    state: r_arm

- type: entity
  id: ParasiticLegs
  parent: LeftLegHuman
  name: parasitic legs
  description: Grotesque organic legs fused into one horrifying mass. The parasite has consumed both legs entirely.
  components:
  - type: ParasiticLimb
    limbType: Leg
    damageMultiplier: 1.5
  - type: Sprite
    sprite: _FreakStation/Mobs/Species/Human/ParasiticParts/parts.rsi
    state: legs
