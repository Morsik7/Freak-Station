# Parasite Eggs

# Unfertilized egg (from monkey stage) - contains infection liquid
- type: entity
  id: ParasiteUnfertilizedEgg
  parent: FoodEgg
  name: parasite egg
  description: A strange organic egg. It pulses slightly.
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/egg.rsi
    state: egg
    color: "#8B4789"
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 20
        reagents:
        - ReagentId: ParasiteInfectionFluid
          Quantity: 15
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: ParasiteInfectionFluid
        Quantity: 15

# Fertilized egg (from chimera at 100%) - spawns larva with host's mind
- type: entity
  id: ParasiteFertilizedEgg
  parent: BaseItem
  name: fertilized parasite egg
  description: A large pulsating egg. Something is moving inside...
  components:
  - type: Sprite
    sprite: Objects/Consumable/Food/egg.rsi
    state: egg
    color: "#5C2D5C"
  - type: Transform
    anchored: false
  - type: Physics
    bodyType: Dynamic
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.2
        density: 50
        mask:
        - ItemMask
        layer:
        - LowImpassable
  - type: ParasiteEgg
    hatchDelay: 300  # 5 minutes
